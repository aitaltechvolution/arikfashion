<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arik Fashion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #fafafa; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

      /* ── Global popup / overlay animations ─────────────────────────── */
      @keyframes globalFadeIn   { from { opacity: 0; }                       to { opacity: 1; } }
      @keyframes globalSlideUp  { from { opacity: 0; transform: translateY(28px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
      @keyframes globalSlideRight { from { opacity: 0.5; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }

      /* Backdrop utility */
      .popup-backdrop {
        animation: globalFadeIn 0.3s cubic-bezier(0.22,1,0.36,1);
        backdrop-filter: blur(5px);
        -webkit-backdrop-filter: blur(5px);
      }
      /* Modal utility */
      .popup-modal {
        animation: globalSlideUp 0.4s cubic-bezier(0.22,1,0.36,1);
      }

      /* ── Text legibility improvements ───────────────────────────────── */
      /* Product names, labels */
      .product-name   { color: #1a1a1a !important; }
      .product-price  { color: #1a1a1a !important; }
      .product-meta   { color: #3d342c !important; }

      /* Form labels across all pages */
      label { color: #3d342c; }

      /* Legal, terms, privacy body copy */
      .legal-body p   { color: #2a2a2a !important; }
      .legal-body h2  { color: #0a0a0a !important; }

      /* Checkout & auth secondary text */
      .text-secondary { color: #3d342c !important; }
      .text-muted     { color: #5a4e46 !important; }

      /* Smooth transitions for interactive elements */
      button, a, input, select, textarea {
        transition-property: color, background-color, border-color, box-shadow, opacity, transform;
        transition-duration: 0.22s;
        transition-timing-function: cubic-bezier(0.22,1,0.36,1);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
